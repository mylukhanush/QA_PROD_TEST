<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | QA Agent</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
        }

        .glow-sphere {
            filter: blur(140px);
            opacity: 0.45;
            mix-blend-mode: screen;
            pointer-events: none;
        }
    </style>
</head>

<body class="h-full overflow-hidden relative text-white">
    <!-- Glowing background blobs -->
    <div class="absolute w-[600px] h-[600px] rounded-full bg-brand-700/30 top-[-10%] left-[-10%] glow-sphere"></div>
    <div class="absolute w-[600px] h-[600px] rounded-full bg-pink-900/20 bottom-[-10%] right-[-10%] glow-sphere"></div>
    <div class="absolute w-[500px] h-[500px] rounded-full bg-indigo-900/30 top-[40%] left-[40%] glow-sphere"></div>

    <!-- Main Grid Split Shell -->
    <div class="grid grid-cols-1 lg:grid-cols-12 h-full w-full min-h-screen relative z-10">

        <!-- Left Column: Branding Section -->
        <div class="lg:col-span-5 flex flex-col justify-center items-center p-8 select-none">
            <div class="flex flex-col items-center max-w-md text-center">
                <!-- Large Elegant Shield Check Logo -->
                <div
                    class="w-24 h-24 rounded-3xl bg-gradient-to-tr from-brand-600 to-indigo-500 flex items-center justify-center shadow-2xl shadow-brand-500/30 mb-8 animate-pulse border border-white/10">
                    <svg class="w-12 h-12 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                        stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>

                <!-- Title & Subtitle -->
                <h1 class="text-4xl lg:text-5xl font-extrabold tracking-tight text-white mb-3 text-center">
                    QA Agent
                </h1>
                <p class="text-sm font-semibold tracking-[0.25em] text-indigo-300 uppercase text-center">
                    AI Automation Portal
                </p>
                <div class="w-16 h-1 bg-gradient-to-r from-brand-500 to-pink-500 rounded-full mt-6 mx-auto"></div>
            </div>
        </div>

        <!-- Right Column: Glassmorphic Sign In form -->
        <div class="lg:col-span-7 flex items-center justify-center p-6">
            <div class="w-full max-w-[450px]">

                <!-- Glass Card -->
                <div
                    class="bg-slate-900/50 backdrop-blur-2xl border border-white/10 p-8 lg:p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <h2 class="text-2xl font-bold text-white mb-2">Sign In</h2>
                        <p class="text-sm text-slate-400 mb-8">Sign in with your configured credentials to continue.</p>

                        {% if error %}
                        <div
                            class="mb-6 p-4 rounded-2xl bg-rose-500/10 border border-rose-500/25 flex gap-3 text-rose-300 text-sm">
                            <svg class="w-5 h-5 shrink-0 text-rose-400" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                            <span>{{ error }}</span>
                        </div>
                        {% endif %}

                        <form action="/login" method="POST" class="space-y-6">
                            <!-- Username -->
                            <div>
                                <label for="username"
                                    class="block text-xs uppercase tracking-wider font-semibold text-slate-400 mb-2">Username</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                            stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                        </svg>
                                    </span>
                                    <input type="text" id="username" name="username" required autocomplete="username"
                                        placeholder="Enter username"
                                        class="w-full bg-slate-950/40 border border-white/10 rounded-2xl py-3.5 pl-12 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                                </div>
                            </div>

                            <!-- Password with Eye Toggle -->
                            <div>
                                <label for="password"
                                    class="block text-xs uppercase tracking-wider font-semibold text-slate-400 mb-2">Password</label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                            stroke-width="2">
                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                    </span>
                                    <input type="password" id="password" name="password" required
                                        autocomplete="current-password" placeholder="Enter password"
                                        class="w-full bg-slate-950/40 border border-white/10 rounded-2xl py-3.5 pl-12 pr-12 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all">
                                    <!-- Eye icon toggle button -->
                                    <button type="button" onclick="togglePassword()" id="eye-toggle"
                                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-slate-300 transition-colors focus:outline-none">
                                        <span id="eye-icon">
                                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                                stroke-width="2">
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                            </svg>
                                        </span>
                                    </button>
                                </div>
                            </div>

                            <!-- Submit -->
                            <div class="pt-2">
                                <button type="submit"
                                    class="w-full py-4 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-bold rounded-2xl shadow-lg shadow-brand-500/25 transition-all active:scale-[0.98]">
                                    Sign In
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Password visibility toggle script -->
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                eyeIcon.innerHTML = `
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    </svg>
                `;
            } else {
                pwd.type = 'password';
                eyeIcon.innerHTML = `
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                `;
            }
        }
    </script>
</body>

</html>
